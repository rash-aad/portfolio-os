services:
  - type: web
    name: portfolio-os-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: llama3-8b-8192
      - key: CHROMA_PATH
        value: /data/chroma_db
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: chroma-db
      mountPath: /data/chroma_db
      sizeGB: 1
